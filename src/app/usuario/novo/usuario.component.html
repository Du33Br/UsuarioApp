<div class="usuario-page" style="padding:16px">
  <div class="header">
    <h2>Usuários</h2>
    <button nz-button nzType="primary" [routerLink]="['/app','usuario']">Usuários</button>
  </div>

  <nz-spin [nzSpinning]="loading()">
    <nz-table [nzData]="users()" nzBordered nzSize="middle">
      <thead>
        <tr>
          <th style="width:80px">ID</th>
          <th>Nome</th>
          <th>CPF</th>
          <th>Unidade</th>
          <th style="width:140px">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users()">
          <td>{{ u.id }}</td>
          <td>{{ u.nome }}</td>
          <td>{{ u.cpf }}</td>
          <td>{{ u.unidade?.nome || u.unidade }}</td>
          <td>
            <button nz-button nzType="default" nzSize="small">Editar</button>
            <button nz-button nzType="primary" nzSize="small">Ver</button>
          </td>
        </tr>
      </tbody>
    </nz-table>

    <div class="pager" style="margin-top:12px;display:flex;justify-content:flex-end">
      <nz-pagination
        [nzPageIndex]="pageIndex()"
        [nzTotal]="total()"
        [nzPageSize]="pageSize()"
        [nzShowSizeChanger]="true"
        [nzPageSizeOptions]="[5,10,20]"
        (nzPageIndexChange)="onPageIndexChange($event)"
        (nzPageSizeChange)="onPageSizeChange($event)">
      </nz-pagination>
    </div>
  </nz-spin>
</div>
